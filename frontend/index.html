<!DOCTYPE html>
<html>
<head>
    <title>My App</title>
</head>
<body>
    <h1>Hello Frontend 🎉</h1>
    <p>Backend says:</p>
    <button onclick="loadData()">Call Backend</button>
    <p id="result"></p>

    <script>
        function loadData() {
            fetch('http://localhost:5000/')
                .then(res => res.text())
                .then(data => {
                    document.getElementById("result").innerText = data;
                });
        }
    </script>
</body>
</html>
